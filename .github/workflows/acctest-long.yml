name: Acceptance Tests (Long)
# The long tier (TestAccLong*) runs multi-node universe deploys, ~15 min each.
# Runs automatically on pushes to main (post-merge), and on demand. Not run on
# PRs — too slow and expensive to gate every PR.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  acctest-long:
    name: Acceptance Tests (Long)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      # Write the secret to acctest/env so `make acctest-long` sources it like a local run.
      - name: Load test env
        run: |
          if [ -z "$ACCTEST_ENV" ]; then
            echo "::error::ACCTEST_ENV secret is not set"
            exit 1
          fi
          printf '%s' "$ACCTEST_ENV" > acctest/env
        env:
          ACCTEST_ENV: ${{ secrets.ACCTEST_ENV }}

      # TestAccLong_YBA_GCP_OSImageUpgrade installs its own throwaway YBA and
      # needs the license file; unset secret means the test skips, not fails.
      - name: Load YBA license
        run: |
          if [ -n "$YBA_LICENSE" ]; then
            printf '%s' "$YBA_LICENSE" > yugabyte_anywhere.lic
          fi
        env:
          YBA_LICENSE: ${{ secrets.YBA_LICENSE }}

      - name: Install gotestsum
        run: make gotestsum-install

      - name: Long acceptance tests
        run: make acctest-long
        env:
          GOTESTSUM_FORMAT: github-actions
